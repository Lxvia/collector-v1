server:
  port: 8080

spring:
  application:
    name: collector-backend
  datasource:
    url: jdbc:postgresql://127.0.0.1:5433/collector
    username: collector
    password: collector
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus